services:
  # Backend API Service
  # DATABASE_URL and SECRET_KEY must be set manually in Render Dashboard → Environment
  # Use the External Database URL from your Render PostgreSQL service.
  - type: web
    name: zendbx-backend
    runtime: docker
    region: oregon
    plan: starter
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: "8000"
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        value: "https://devapp.zendbx.in"
      - key: BACKEND_URL
        value: "https://api.zendbx.in"
      - key: OAUTH_REDIRECT_URI
        value: "https://devapp.zendbx.in/callback"
      - key: ALLOWED_ORIGINS
        value: '["https://devapp.zendbx.in","https://zendbx.in","https://www.zendbx.in","https://api.zendbx.in"]'
      - key: BASE_DOMAIN
        value: "zendbx.in"
      - key: ENABLE_SUBDOMAIN_ROUTING
        value: "true"
