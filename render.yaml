services:
  # Backend API Service
  - type: web
    name: zendbx-backend
    runtime: docker
    region: oregon
    plan: starter
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: 8000
      - key: ENVIRONMENT
        value: production
    envVars:
      - key: PORT
        value: 8000
