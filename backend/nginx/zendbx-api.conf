# ──────────────────────────────────────────────────────────────────────────────
# Nginx configuration for api.zendbx.in (ZendBX Backend API)
#
# Security hardening:
#   - Directory listing disabled (autoindex off)
#   - X-Robots-Tag: noindex on all API responses
#   - Docs/Swagger/OpenAPI endpoints blocked at proxy level
#   - Server fingerprinting removed
# ──────────────────────────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    server_name api.zendbx.in;

    # ── SSL (managed by Certbot / cloud provider) ──────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.zendbx.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.zendbx.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Hardening ──────────────────────────────────────────────────────────
    server_tokens       off;          # Remove Nginx version from Server header
    autoindex           off;          # Never list directory contents

    # ── Global security headers ────────────────────────────────────────────
    add_header X-Robots-Tag        "noindex, nofollow, noarchive, nosnippet" always;
    add_header X-Content-Type-Options "nosniff"                              always;
    add_header X-Frame-Options     "DENY"                                    always;
    add_header Referrer-Policy     "strict-origin-when-cross-origin"         always;

    # ── Block API documentation endpoints completely ────────────────────────
    location ~ ^/(docs|redoc|openapi\.json|swagger)(/?.*)?$ {
        return 404;
    }

    # ── Block access to sensitive files if ever served statically ──────────
    location ~ /\.(env|git|dockerignore)$ {
        return 404;
    }
    location ~* (Dockerfile|package\.json|requirements\.txt|\.env\.example)$ {
        return 404;
    }

    # ── Proxy all other requests to FastAPI ───────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}

# ── Redirect HTTP → HTTPS ──────────────────────────────────────────────────
server {
    listen 80;
    server_name api.zendbx.in;
    return 301 https://$host$request_uri;
}
