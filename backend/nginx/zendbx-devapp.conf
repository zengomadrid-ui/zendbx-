# ──────────────────────────────────────────────────────────────────────────────
# Nginx configuration for devapp.zendbx.in (Development App)
#
# This domain must NEVER be indexed by search engines.
# Every response carries noindex headers regardless of path.
# ──────────────────────────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    server_name devapp.zendbx.in *.preview.zendbx.in staging.zendbx.in;

    ssl_certificate     /etc/letsencrypt/live/devapp.zendbx.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devapp.zendbx.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    server_tokens off;
    autoindex     off;

    # ── Block ALL indexing ─────────────────────────────────────────────────
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
    add_header X-Frame-Options "DENY"                                  always;
    add_header X-Content-Type-Options "nosniff"                        always;

    # Serve a static robots.txt that blocks everything
    location = /robots.txt {
        add_header Content-Type text/plain;
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}

server {
    listen 80;
    server_name devapp.zendbx.in *.preview.zendbx.in staging.zendbx.in;
    return 301 https://$host$request_uri;
}
